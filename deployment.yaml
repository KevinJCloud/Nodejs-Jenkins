apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nodejs
  labels:
    app: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
    spec:
      containers:
      - name: nodejs
        image: kevinjcloud/nodejs:v1
        ports:
        - containerPort: 3000

